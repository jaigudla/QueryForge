name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: queryforge-windows
            binary: build/Release/queryforge.exe
          - os: ubuntu-latest
            artifact: queryforge-linux
            binary: build/queryforge
          - os: macos-latest
            artifact: queryforge-macos
            binary: build/queryforge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
