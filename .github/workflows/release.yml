name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: queryforge-windows
            archive: queryforge-windows.zip
            binary: build/Release/queryforge.exe
          - os: ubuntu-latest
            artifact: queryforge-linux
            archive: queryforge-linux.tar.gz
            binary: build/queryforge
          - os: macos-latest
            artifact: queryforge-macos
            archive: queryforge-macos.tar.gz
            binary: build/queryforge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/Release/queryforge.exe -DestinationPath ${{ matrix.archive }}

      - name: Package Unix
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C build queryforge

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && sha256sum * > SHA256SUMS.txt)
          done
          find . -name SHA256SUMS.txt -exec cat {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/queryforge-windows/queryforge-windows.zip
            artifacts/queryforge-windows/SHA256SUMS.txt
            artifacts/queryforge-linux/queryforge-linux.tar.gz
            artifacts/queryforge-linux/SHA256SUMS.txt
            artifacts/queryforge-macos/queryforge-macos.tar.gz
            artifacts/queryforge-macos/SHA256SUMS.txt
          generate_release_notes: true
